# Минимальный starter pipeline для team+ai.
#
# До /adopt-stack здесь зеркало pre-commit + validate-links.
# /adopt-stack добавит:
#   - стек-специфичный build / test / typecheck
#   - SAST + SCA + secret scan
#   - mutation testing
#   - SBOM + container scan
#   - deploy:dev/staging/prod (по регламенту GitLab workflow §10)
#
# Использует workflow:rules чтобы пайплайн не дублировался при пуше
# в feature-ветку с открытым MR.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

stages:
  - lint
  - test
  - build
  - security
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PRE_COMMIT_HOME: "$CI_PROJECT_DIR/.cache/pre-commit"

cache:
  paths:
    - .cache/pip
    - .cache/pre-commit

# -----------------------------------------------------------------------------
# Lint: pre-commit на всём репо + валидация графа связок
# -----------------------------------------------------------------------------

pre-commit:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install --quiet pre-commit
  script:
    - pre-commit run --all-files --show-diff-on-failure

validate-links:
  stage: lint
  image: python:3.12-slim
  script:
    - scripts/validate-links.sh --report

build-adr-index:check:
  stage: lint
  image: python:3.12-slim
  script:
    - python3 scripts/build-adr-index.py --check

# -----------------------------------------------------------------------------
# Test / Build / Security / Deploy — заполнит /adopt-stack
# -----------------------------------------------------------------------------

# Заглушки, чтобы pipeline не падал в Phase 0 (нет кода — нечего тестировать).
# /adopt-stack заменит их на реальные jobs.

test:placeholder:
  stage: test
  image: alpine:3.20
  script:
    - echo "Phase 0 / 0.5: тестов нет; заполнится /adopt-stack."
  allow_failure: false

build:placeholder:
  stage: build
  image: alpine:3.20
  script:
    - echo "Phase 0 / 0.5: артефакта нет; заполнится /adopt-stack."

security:placeholder:
  stage: security
  image: alpine:3.20
  script:
    - echo "Заполнится /adopt-stack: gitleaks, trivy fs, SAST, dependency scanning."

# -----------------------------------------------------------------------------
# Deep-проверки (mutation testing, SBOM, container/IaC scan) — nightly.
#
# ВАЖНО: по ADR 20260522-1400 это **основное место** запуска deep-проверок
# в команде. Локальный scripts/ci-deep.sh остаётся как opt-in для отладки.
#
# Как настроить (один раз, для всей команды):
#   GitLab -> проект -> Settings -> CI/CD -> Pipeline schedules -> New schedule
#     Description:    Nightly deep security checks
#     Interval:       0 3 * * *      (удобное окно низкой нагрузки, UTC)
#     Cron timezone:  UTC
#     Target branch:  main
#     Activated:      yes
#
# Это операционная задача (не делается через MR). Кто настраивает — обычно
# release-инженер или maintainer. После настройки job начнёт срабатывать
# по расписанию; ручной запуск — через Run pipeline на schedule, либо через
# выставленный `CI_PIPELINE_SOURCE=schedule` (зависит от GitLab-инстанса).
#
# Если /adopt-stack ещё не запущен — job бежит шаблонный ci-deep.sh, который
# в Phase 0 печатает «нечего проверять» и выходит зелёным. Норма.
# -----------------------------------------------------------------------------

security-deep:nightly:
  stage: security
  image: alpine:3.20   # /adopt-stack заменит на стек-релевантный образ
  before_script:
    - apk add --no-cache bash
  script:
    - bash scripts/ci-deep.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  allow_failure: false

# -----------------------------------------------------------------------------
# Deploy (закомментировано — включить после /adopt-stack + конфига окружений).
# Шаблон соответствует регламенту GitLab workflow §10.
